<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/iniciosesion.css">
    <title>Inicio de Sesión</title>
</head>
<body>
    <div class="barra-superior"></div>
    <div class="contenedor-principal">
        <div class="icono-seguridad">
            <svg viewBox="0 0 24 24">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-1 6h2v2h-2V7zm0 4h2v6h-2v-6z"/>
            </svg>
        </div>
        <h3>Inicio de Sesión</h3>
        <form id="formulario-inicio">
            <div class="grupo-entrada">
                <span class="icono-busqueda">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </span>
                <input type="text" class="entrada" placeholder="Nombre de Usuario" required>
            </div>
            <div class="grupo-entrada">
                <span class="icono-busqueda">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </span>
                <input type="password" class="entrada" placeholder="Contraseña" required>
            </div>
        </form>
        <p class="subtitulo">¿No tienes cuenta? <a href="./registroadmin.html">Regístrate</a></p>
        <button type="button" id="btn-enviar" class="btn-inicio-sesion"><a href="./menuprincipaladmin.html">Iniciar Sesión</a></button>
    </div>
    <div class="barra-inferior"></div>

    <script src="./js/iniciosesionadmin.js"></script>
</body>
</html>
