<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/registro.css">
    <title>Registro</title>
</head>
<body>
    <div class="barra-superior">
        <header>Registro Cliente</header>
    </div>
    
    <div class="contenedor-principal">
        <div class="seccion-formulario">
            <form>
                <input type="text" class="entrada" placeholder="Nombre de Usuario" required>
                <input type="email" class="entrada" placeholder="Correo Electrónico" required>
                <input type="text" class="entrada" placeholder="Número Telefónico" required>
                <input type="text" class="entrada" placeholder="Contraseña" required>
            </form>
        </div>

        <div class="tarjeta-ilustracion">
            <h3>Lic. CASH</h3>
            <div class="contenedor-imagen">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=cash&backgroundColor=222e3c" alt="Lic. Cash">
            </div>
        </div>
    </div>

    <div class="barra-inferior">
        <a href="./accesocliente.html"><button>Regresar</button></a>
        <button type="button" id="btn-enviar" class="btn-registro" onclick="">Completar Registro</button>
    </div>
</body>
</html>
