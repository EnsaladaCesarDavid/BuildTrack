<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/menuprincipaladmin.css">
    <title>Panel de Administración - BuildTrack</title>
</head>
<body>

    <div class="barra-superior">
        <div class="usuario-info">
            <div class="avatar-circular">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&hairColor=2c1a04&accessories=prescription02" alt="Avatar Administrador">
            </div>
            <h2>Administrador</h2>
        </div>
        <a href="./bienvenido.html" class="icono-home">
            <svg viewBox="0 0 24 24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
        </a>
    </div>

    <div class="contenedor-layout">
        <aside class="menu-lateral">
            <h3 class="titulo-menu">Administración de proyectos</h3>
            <ul class="lista-menu">
                <li class="item-proyectos">
                    <a href="#">Mis proyectos</a>
                    <ul class="sublista-proyectos lista-scrollable-admin" id="sublista-proyectos-admin">                       
                    </ul>
                </li>
            </ul>
            <div class="grupo-botones-laterales">
                <button class="btn-lateral"><a href="./gestionarproyecto.html" class="nose">Gestionar Proyecto</a></button>
                <button class="btn-lateral">Crear Proyecto</button>
            </div>
        </aside>

        <main class="contenido-panel">
            <div class="seccion-formulario">
                <h3 class="titulo-seccion">Crear nuevo proyecto</h3>
                <form class="tarjeta-blanca formulario-proyecto" id="form-nuevo-proyecto">
                    <div class="campo-completo">
                        <label>Nombre del proyecto</label>
                        <input type="text" id="proj-nombre" placeholder="Nombre del proyecto" required>
                    </div>
                    
                    <div class="campo-completo">
                        <label>Tipo de proyecto</label>
                        <div style="display: flex; gap: 12px; align-items: center; margin-top: 6px;">
                            <a href="./tipoproyectoadmin.html" id="link-tipo-proyecto" class="btn-lateral" style="text-decoration: none; text-align: center; width: auto; padding: 10px 20px; display: inline-block;">
                                Configurar Modelo y Transporte
                            </a>
                            <span id="txt-modelo-seleccionado" style="font-size: 0.9rem; color: #64748b; font-style: italic; transition: color 0.3s ease;">
                                (Ningún modelo seleccionado)
                            </span>
                        </div>
                    </div>

                    <div class="fila-campos">
                        <div class="campo-mitad">
                            <label>Fecha de inicio</label>
                            <input type="date" id="proj-inicio" required>
                        </div>
                        <div class="campo-mitad">
                            <label>Fecha estimada de finalización</label>
                            <input type="date" id="proj-fin" required>
                        </div>
                    </div>

                    <div class="campo-completo">
                        <label>Presupuesto</label>
                        <div class="contenedor-prefijo">
                            <span class="prefijo-moneda">$</span>
                            <input type="text" id="proj-presupuesto" placeholder="0.00" required>
                        </div>
                    </div>
                    
                    <div class="campo-completo" style="margin-top: 15px; display: flex; gap: 10px;">
                        <button type="submit" class="btn-lateral" style="width: 50%;">Guardar Proyecto</button>
                        <button type="button" id="btn-borrar-datos" class="btn-lateral" style="width: 50%; background-color: #ef4444; color: #ffffff;">Borrar Datos</button>
                    </div>
                </form>
            </div>

            <div class="seccion-opciones">
                <h3 class="titulo-seccion">Opciones extra</h3>
                <div class="tarjeta-blanca cuadricula-opciones">
                    <div class="opcion-item">
                        <svg viewBox="0 0 24 24">
                            <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                        <span><a href="./registrocliente.html">Registrar Usuario</a></span>
                    </div>

                    <div class="opcion-item item-centrado">
                        <svg viewBox="0 0 24 24">
                            <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zm-1 10c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/>
                        </svg>
                        <span><a href="./contrato-permisos.html">Contratos/permisos</a></span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="barra-inferior">
        <a href="./bienvenido.html"><button class="btn-cerrar">Cerrar Sesion</button></a>
    </div>

    <script src="./js/crearproyecto.js"></script>
</body>
</html>
