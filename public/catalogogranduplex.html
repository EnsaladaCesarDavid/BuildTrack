<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/catalogogranduplex.css">
    <title>Catálogo - Gran Dúplex con Terraza</title>
</head>
<body>

    <header class="barra-superior">
        <div class="usuario-info">
            <div class="avatar">
                <span class="avatar-placeholder">👤</span> 
            </div>
            <div class="texto-header">
                <h1>Catalogo - Gran Dúplex con Terraza</h1>
                <p>Cliente</p>
            </div>
        </div>
        <a href="./paginaprincipal.html" class="boton-home">
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="#E29513"/>
            </svg>
        </a>
    </header>

    <div class="linea-naranja"></div>

    <main class="contenedor-variantes">
        
        <section class="tarjeta-variante">
            <div class="contenedor-img">
                <img src="./img/modelo4B.png" alt="Gran Dúplex con Terraza - Modelo 1">
            </div>
            <div class="info-variante">
                <h3>Modelo 1</h3>
                <p class="precio">$1,780,000 MXN</p>
            </div>
            <div class="linea-divisoria"></div>
            <div class="pie-tarjeta">
                <span>Ver mas</span>
                <button class="btn-accion">#</button>
            </div>
        </section>

        <section class="tarjeta-variante">
            <div class="contenedor-img">
                <img src="./img/modelo4M.png" alt="Gran Dúplex con Terraza - Modelo 2">
            </div>
            <div class="info-variante">
                <h3>Modelo 2</h3>
                <p class="precio">$2,350,000 MXN</p>
            </div>
            <div class="linea-divisoria"></div>
            <div class="pie-tarjeta">
                <span>Ver mas</span>
                <button class="btn-accion">#</button>
            </div>
        </section>

        <section class="tarjeta-variante">
            <div class="contenedor-img">
                <img src="./img/modelo4C.png" alt="Gran Dúplex con Terraza - Modelo 3">
            </div>
            <div class="info-variante">
                <h3>Modelo 3</h3>
                <p class="precio">$3,150,000 MXN</p>
            </div>
            <div class="linea-divisoria"></div>
            <div class="pie-tarjeta">
                <span>Ver mas</span>
                <button class="btn-accion">#</button>
            </div>
        </section>

    </main>

    <footer class="barra-inferior">
        <div class="linea-naranja-inferior"></div>
        <div class="contenedor-regresar">
            <a href="./catalogotamanos.html">
                <button class="btn-regresar">Regresar</button>
            </a>
        </div>
    </footer>

</body>
</html>
