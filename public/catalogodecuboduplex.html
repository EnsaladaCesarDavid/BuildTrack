<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Ruta enlazada directamente con el nombre exacto de la sección -->
    <link rel="stylesheet" href="./css/catalogodecuboduplex.css">
    <title>Catálogo - Cubo Dúplex</title>
</head>
<body>

    <!-- Barra Superior / Encabezado -->
    <header class="barra-superior">
        <div class="usuario-info">
            <div class="avatar">
                <span class="avatar-placeholder">👤</span> 
            </div>
            <div class="texto-header">
                <h1>Catalogo - Cubo Dúplex</h1>
                <p>Cliente</p>
            </div>
        </div>
        <a href="./paginaprincipal.html" class="boton-home">
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="#E29513"/>
            </svg>
        </a>
    </header>

    <div class="linea-naranja"></div>

    <!-- Contenedor de las 3 Variantes de Cubo Dúplex -->
    <main class="contenedor-variantes">
        
        <!-- Variante Modelo 1 -->
        <section class="tarjeta-variante">
            <div class="contenedor-img">
                <!-- Configurado con tu formato exacto de nombres -->
                <img src="./img/modelo3B.png" alt="Cubo Dúplex - Modelo 1">
            </div>
            <div class="info-variante">
                <h3>Modelo 1</h3>
                <p class="precio">$1,380,000 MXN</p>
            </div>
            <div class="linea-divisoria"></div>
            <div class="pie-tarjeta">
                <span>Ver mas</span>
                <a href="detallesmod3B.html">
                    <button class="btn-accion">#</button>
                </a>
                
            </div>
        </section>

        <!-- Variante Modelo 2 -->
        <section class="tarjeta-variante">
            <div class="contenedor-img">
                <!-- Configurado con tu formato exacto de nombres -->
                <img src="./img/modelo3M.png" alt="Cubo Dúplex - Modelo 2">
            </div>
            <div class="info-variante">
                <h3>Modelo 2</h3>
                <p class="precio">$1,820,000 MXN</p>
            </div>
            <div class="linea-divisoria"></div>
            <div class="pie-tarjeta">
                <span>Ver mas</span>
                <button class="btn-accion">#</button>
            </div>
        </section>

        <!-- Variante Modelo 3 -->
        <section class="tarjeta-variante">
            <div class="contenedor-img">
                <!-- Configurado con tu formato exacto de nombres -->
                <img src="./img/modelo3C.png" alt="Cubo Dúplex - Modelo 3">
            </div>
            <div class="info-variante">
                <h3>Modelo 3</h3>
                <p class="precio">$2,450,000 MXN</p>
            </div>
            <div class="linea-divisoria"></div>
            <div class="pie-tarjeta">
                <span>Ver mas</span>
                <button class="btn-accion">#</button>
            </div>
        </section>

    </main>

    <!-- Barra Inferior -->
    <footer class="barra-inferior">
        <div class="linea-naranja-inferior"></div>
        <div class="contenedor-regresar">
            <a href="./catalogotamanos.html">
                <button class="btn-regresar">Regresar</button>
            </a>
        </div>
    </footer>

</body>
</html>
