<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/registro.css">
    <title>Registro</title>
</head>
<body>
    <div class="barra-superior">
        <header>Registro Admin</header>
    </div>
    
    <div class="contenedor-principal">
        <div class="seccion-formulario">
            <form id="formulario">
                <input type="text" id="nombre" class="entrada" placeholder="Nombre de Usuario" required>
                <input type="email" id="email" class="entrada" placeholder="Correo Electrónico" required>
                <input type="text" id="password" class="entrada" placeholder="Contraseña" required>
            </form>
        </div>

        <div class="tarjeta-ilustracion">
            <h3>Lic. CASH</h3>
            <div class="contenedor-imagen">
                <img src="./img/liccash.png" alt="Lic. Cash">
            </div>
        </div>
    </div>

    <div class="barra-inferior">
        <a href="./accesoadmin.html"><button>Regresar</button></a>
        <button type="button" id="btn-enviar" class="btn-registro" onclick="">Completar Registro</button>
    </div>

    <script src="./js/registroadmin.js"></script>
</body>
</html>
