<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contratos y Permisos</title>
    <link rel="stylesheet" href="css/contrato-permisos.css">
</head>
<body>

    <header class="barra-superior">
        <div class="usuario-info">
            <div class="avatar-circular">
                <img src="https://via.placeholder.com/45" alt="Admin Avatar">
            </div>
            <h2>Administrador</h2>
        </div>
        <div class="contenedor-id-proyecto">
            <span class="etiqueta-id-proyecto" id="proyecto-id-badge">Seleccione un proyecto</span>
        </div>
    </header>

    <div class="contenedor-layout">
        <aside class="menu-lateral">
            <h3 class="titulo-menu">Opciones</h3>
            <ul class="lista-menu">
                <li class="item-proyectos">
                    <p style="font-weight: bold; margin-bottom: 5px;">Mis proyectos</p>
                    <ul class="sublista-proyectos" id="sublista-proyectos" style="max-height: 250px; overflow-y: auto; list-style: none; padding-left: 0;">
                    </ul>
                </li>
            </ul>
        </aside>

        <main class="contenido-principal">
            <div class="tarjeta-documento">
                
                <div class="encabezado-seccion">
                    <h2 class="titulo-documento">Contratos / Permisos</h2>
                    <button type="button" id="btn-mostrar-formulario" class="btn-abrir-subida" title="Subir nuevo documento">+</button>
                </div>

                <div id="contenedor-formulario-carga" class="formulario-carga-card oculto">
                    <h3 style="margin-top: 0; margin-bottom: 15px; color: #1e293b;">Vincular Nuevo Archivo PDF</h3>
                    <form id="form-subir-pdf">
                        <div class="grupo-campo">
                            <label for="input-nombre-contrato">Nombre del Contrato / Permiso:</label>
                            <input type="text" id="input-nombre-contrato" placeholder="Ej. Contrato de Obra Civil" required>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="grupo-campo">
                                <label for="input-fecha-firma">Fecha de Firma:</label>
                                <input type="date" id="input-fecha-firma" required>
                            </div>
                            <div class="grupo-campo">
                                <label for="input-vigencia">Fecha de Vigencia:</label>
                                <input type="date" id="input-vigencia" required>
                            </div>
                        </div>

                        <div class="grupo-campo" style="margin-top: 10px;">
                            <label for="input-archivo-pdf">Seleccionar Documento (Exclusivo .pdf):</label>
                            <input type="file" id="input-archivo-pdf" accept=".pdf" required>
                        </div>

                        <div class="contenedor-botones-form">
                            <button type="button" id="btn-cancelar-carga" class="btn-cancelar">Cancelar</button>
                            <button type="submit" id="btn-subir-documento" class="btn-primario">Guardar en Base de Datos</button>
                        </div>
                    </form>
                </div>

                <div class="lista-documentos" id="contenedor-lista-documentos" style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;">
                    <p id="mensaje-vacio" style="color: #64748b; text-align: center; font-style: italic;">Por favor, seleccione un proyecto del menú lateral para gestionar sus expedientes.</p>
                </div>

            </div>
        </main>
    </div>

    <footer class="barra-inferior">
        <button class="btn-regresar"><a href="menuprincipaladmin.html" style="color: inherit; text-decoration: none;">Regresar al Menú</a></button>
    </footer>

    <script src="./js/contrato-permisos.js"></script>
</body>
</html>
