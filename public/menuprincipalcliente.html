<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/menuprincipalcliente.css">
    <title>Menú Principal - Cliente</title>
</head>
<body>

    <div class="barra-superior">
        <div class="usuario-info">
            <div class="avatar-circular">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka&clothingColor=e05e1a" alt="Avatar Cliente">
            </div>
            <h2>Cliente</h2>
        </div>
        <a href="./bienvenido.html" class="icono-home">
            <svg viewBox="0 0 24 24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
        </a>
    </div>

    <div class="contenedor-layout">
        <aside class="menu-lateral">
            <h3 class="titulo-menu">Menu</h3>
            <ul class="lista-menu">
                <li><a href="./catalogotamanos.html">Ver catálogo</a></li>
                <li class="item-proyectos">
                    <div class="contenedor-proyectos-header">
                        <p>Mis proyectos</p>
                        <button type="button" id="btn-agregar-proyecto" class="btn-mas">+</button>
                    </div>
                    <ul id="sublista-proyectos" class="lista-scrollable">
                        </ul>
                </li>
            </ul>
            <button class="btn-visualizar" id="btn-visualizar-proyecto">Visualizar Proyecto</button>
        </aside>

        <main class="contenido-galeria">
            <div class="tarjeta-imagen">
                <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1200&q=80" alt="Vista Maqueta Proyectos">
            </div>
        </main>
    </div>

    <div class="barra-inferior">
        <button type="button" id="btn-logout-cliente" class="btn-cerrar" style="cursor: pointer;">Cerrar Sesion</button>
    </div>

    <script src="./js/proyectoscliente.js"></script>
</body>
</html>
